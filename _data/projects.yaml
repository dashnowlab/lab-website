- title: 1000 Genomes Project Long Read Sequencing Consortium
  subtitle: Re-sequencing >3,000 samples from the 1000 Genomes Project with long-read sequencing
  group: featured
  image: https://millerlaboratory.com/images/1KGP-LRS-banner.png
  link: https://millerlaboratory.com/1KGP-LRS.html
  description: We aim to perform long-read sequencing of all 3,202 1KGP samples. The goal of the Consortium is to identify a broader spectrum of genomic variation than is possible using short-read sequencing so we may further improve our understanding of human genetic disease. This dataset is already enabling us to better understand normal patterns of human structural variation, identify variation in difficult-to-map regions of the genome, and study repeat expansions and methylation patterns.
  tags:
    - resource

- title: Platinum Pedigree
  subtitle: A comprehensive reference for human genetic variation in a four-generation, 28-member family (CEPH 1463)
  group: featured
  image: https://www.biorxiv.org/content/biorxiv/early/2024/08/05/2024.08.05.606142/F1.large.jpg
  link: https://github.com/Platinum-Pedigree-Consortium
  description: We employed five different short and long-read sequencing technologies to generate phased assemblies and characterize both inherited and de novo variation.
  tags:
    - resource

